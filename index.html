<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Pong: Escape Protocol</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div class="scanlines"></div>

    <div id="hud" class="ui-layer">
        <div id="pause-btn" onclick="togglePause()">|| PAUSA</div>

        <div class="hud-top">
            <div class="bar-container"><div id="p1-hp" class="hp-bar"></div></div>
            <div id="vs-badge">VS</div>
            <div class="bar-container"><div id="p2-hp" class="hp-bar"></div></div>
        </div>

        <div class="hud-energy">
            <div class="energy-container"><div id="p1-energy" class="energy-bar"></div></div>
            <div class="energy-label">ENERGY</div>
            <div class="energy-container" style="opacity:0;"></div>
        </div>

        <div id="enemy-name-display"></div>
        <div id="controls-hint" style="position: absolute; bottom: 15px; font-size: 10px; color: #444;">W/S: MOVER | SPACE: OVERDRIVE | CLICK: SWING | ESC: PAUSA</div>
    </div>

    <div id="menu-screen" class="screen pointer-events-auto" style="display: flex;">
        <h1 style="color: #fff; text-shadow: 4px 4px 0 #0ff, -4px -4px 0 #f0f;">CYBER PONG</h1>
        <h2 style="color: #f0f; font-style: italic;">ESCAPE PROTOCOL</h2>

        <button class="btn" onclick="startCampaign()">INICIAR FUGA (CAMPANHA)</button>
        <button class="btn" onclick="showBattleSelect()">BATALHA RÁPIDA</button>
        <button class="btn" onclick="startPVP()">1 VS 1 LOCAL</button>

        <div style="margin-top: 50px; font-size: 12px; color: #0ff;">v 13.0 - LOCK EDITION</div>
    </div>

    <div id="battle-select-screen" class="screen pointer-events-auto"
        <h2>ESCOLHA SEU OPONENTE</h2>
        <div id="battle-grid">
            <!-- boss cards gerados via JS; cada card deve incluir data-difficulty -->
        </div>
        <button class="btn" onclick="showMainMenu()">VOLTAR</button>
    </div>

    <div id="system-log-screen" class="screen pointer-events-auto" onclick="advanceSystemLog()">
        <div id="log-content"></div>
        <div id="log-hint" style="position: absolute; bottom: 20px; right: 20px; color: #0f0;">CLIQUE PARA AVANÇAR_</div>
    </div>

    <div id="story-screen" class="screen pointer-events-auto" style="background: rgba(0,0,0,0.8);">
        <h2 id="level-indicator" style="position: absolute; top: 100px; color: #444;">PRÓLOGO</h2>

        <div id="dialogue-box" onclick="advanceDialogue()">
            <div id="dialogue-portrait">❖</div>
            <div id="dialogue-content">
                <div id="speaker-name">SYSTEM</div>
                <div id="speaker-text">...</div>
            </div>

            <div id="skip-hint">CLIQUE PARA CONTINUAR</div>
        </div>
    </div>

    <div id="pause-screen" class="screen pointer-events-auto" style="background: rgba(0,0,0,0.6);">
        <h1 style="font-size: 40px;">PAUSA</h1>
        <button class="btn" onclick="togglePause()">CONTINUAR</button>
        <button class="btn btn-red" onclick="showMainMenu()">DESISTIR</button>
    </div>

    <div id="ending-screen" class="screen pointer-events-auto">
        <h1 style="color: #0ff; text-shadow: 4px 4px 0 #f0f;">FUGA COMPLETA</h1>
        <p id="ending-msg" style="color: #fff; font-size: 18px; margin: 20px 0;"></p>
        <button class="btn" onclick="showMainMenu()">VOLTAR AO MENU</button>
    </div>

    <div id="result-screen" class="screen pointer-events-auto">
        <h1 id="result-title"></h1>
        <p id="result-msg"></p>

        <button id="next-level-btn" class="btn" onclick="nextLevel()">ACESSAR PRÓXIMO NÍVEL</button>
        <button id="retry-btn" class="btn btn-red" onclick="restartLevel()">TENTAR DE NOVO</button>
        <button class="btn" onclick="showMainMenu()" style="margin-top: 20px; font-size: 14px; border: none; color: #777;">VOLTAR AO MENU</button>
    </div>
</div>
<script type="module" src="game.js"></script>
</body>
</html>
